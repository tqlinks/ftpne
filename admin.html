<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Hệ Thống | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        .report-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-100 dark:bg-gray-950 min-h-screen pb-20 font-sans text-gray-800 dark:text-gray-200">

    <nav class="bg-white dark:bg-gray-900 border-b dark:border-gray-800 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <h1 class="font-black uppercase tracking-tighter text-lg dark:text-white">Admin <span class="text-indigo-500">Panel</span></h1>
            </div>
            <button onclick="location.href='profile.html'" class="text-sm font-bold text-gray-500 hover:text-indigo-500 transition">
                <i class="fas fa-user-circle mr-1"></i> Về Hồ Sơ
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white dark:bg-gray-900 p-4 rounded-2xl border dark:border-gray-800 shadow-sm">
                <p class="text-[10px] font-black text-gray-400 uppercase">Tổng Nhân Sự</p>
                <h3 id="stat-total-users" class="text-2xl font-black text-indigo-600">0</h3>
            </div>
            <div class="bg-white dark:bg-gray-900 p-4 rounded-2xl border dark:border-gray-800 shadow-sm">
                <p class="text-[10px] font-black text-gray-400 uppercase">Tổng Kinah (M)</p>
                <h3 id="stat-total-kinah" class="text-2xl font-black text-purple-500">0</h3>
            </div>
            <div class="bg-white dark:bg-gray-900 p-4 rounded-2xl border dark:border-gray-800 shadow-sm">
                <p class="text-[10px] font-black text-gray-400 uppercase">Tổng Ody</p>
                <h3 id="stat-total-ody" class="text-2xl font-black text-orange-500">0</h3>
            </div>
            <div class="bg-white dark:bg-gray-900 p-4 rounded-2xl border dark:border-gray-800 shadow-sm">
                <p class="text-[10px] font-black text-gray-400 uppercase">FPE Đã Cấp</p>
                <h3 id="stat-total-fpe" class="text-2xl font-black text-yellow-500">0</h3>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-3xl border dark:border-gray-800 shadow-xl overflow-hidden">
            <div class="p-6 border-b dark:border-gray-800 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/20">
                <h2 class="font-black uppercase italic text-sm"><i class="fas fa-list-ul mr-2 text-indigo-500"></i> Báo cáo chi tiết đội ngũ</h2>
                <button onclick="refreshAdminData()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition active:scale-95">
                    <i class="fas fa-sync-alt mr-1"></i> Làm mới
                </button>
            </div>

            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase font-black text-gray-400 bg-gray-50 dark:bg-gray-800/50">
                        <tr>
                            <th class="p-4">Nhân viên / PC</th>
                            <th class="p-4">Sản lượng (Kinah / Ody)</th>
                            <th class="p-4">Tiến độ (%)</th>
                            <th class="p-4 text-center">Linh thú / FPE</th>
                            <th class="p-4 text-center">Bằng chứng</th>
                            <th class="p-4 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="text-sm divide-y dark:divide-gray-800">
                        <tr><td colspan="6" class="p-10 text-center text-gray-500 animate-pulse">Đang tải dữ liệu server...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="imageModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modal-img-view" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
