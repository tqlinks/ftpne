<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Quản Lý Trại Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center bg-slate-900 text-white p-6 rounded-2xl shadow-lg mb-6">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-wider"><i class="fas fa-crown text-yellow-400"></i> Bảng Quản Trị Hệ Thống</h1>
                <p class="text-slate-400 text-sm mt-1">Chỉ dành cho Quản lý cấp cao</p>
            </div>
            <div class="flex gap-4">
                <a href="register.html" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-bold">Đăng ký NV</a>
                <a href="profile.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-bold">Về Profile</a>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-700">
                    <tr>
                        <th class="p-4 border-b">ID Nhân Viên</th>
                        <th class="p-4 border-b">Team</th>
                        <th class="p-4 border-b">Aion 2 (Kinah)</th>
                        <th class="p-4 border-b">MapleStory (Meso)</th>
                    </tr>
                </thead>
                <tbody id="admin-table">
                    <tr><td colspan="4" class="p-4 text-center text-gray-500">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
