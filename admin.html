<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản Lý Sản Lượng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-user-shield mr-2"></i>Bảng Điều Khiển Admin</h1>
            <a href="index.html" class="text-indigo-600 font-semibold"><i class="fas fa-arrow-left"></i> Quay lại</a>
        </div>

        <div class="card overflow-hidden">
            <div class="bg-white p-6 border-b flex justify-between items-center">
                <h2 class="font-bold text-gray-700 uppercase tracking-wider">Danh Sách Nhân Viên & Sản Lượng</h2>
                <button onclick="fetchAdminData()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100">
                    <i class="fas fa-sync-alt mr-1"></i> Làm mới
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-sm uppercase">
                        <tr>
                            <th class="p-4 border-b">Nhân Viên</th>
                            <th class="p-4 border-b">Team</th>
                            <th class="p-4 border-b">Game</th>
                            <th class="p-4 border-b">Aion 2 (M)</th>
                            <th class="p-4 border-b">Maple (B)</th>
                            <th class="p-4 border-b text-center">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-gray-100 bg-white">
                        <tr><td colspan="6" class="p-10 text-center text-gray-400 italic">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function fetchAdminData() {
            const tableBody = document.getElementById('admin-table-body');
            try {
                // Chúng ta sẽ gọi Apps Script với action mới là get_admin
                const res = await fetch(`${CONFIG.SCRIPT_URL}?action=get_admin`);
                const data = await res.json();
                
                tableBody.innerHTML = '';
                data.forEach(user => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="p-4 font-bold text-gray-800">${user.id} <br><span class="text-xs font-normal text-gray-400">${user.email}</span></td>
                            <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${user.team === 'Team A' ? 'bg-blue-100 text-blue-600' : 'bg-yellow-100 text-yellow-600'}">${user.team}</span></td>
                            <td class="p-4 text-sm text-gray-600">${user.game}</td>
                            <td class="p-4 font-mono font-bold text-purple-600">${user.kinah} M</td>
                            <td class="p-4 font-mono font-bold text-teal-600">${user.meso} B</td>
                            <td class="p-4 text-center"><i class="fas fa-check-circle text-green-500"></i></td>
                        </tr>
                    `;
                });
            } catch (e) {
                tableBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-400">Không thể tải dữ liệu Admin.</td></tr>';
            }
        }
        window.onload = fetchAdminData;
    </script>
</body>
</html>
