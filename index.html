<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quản Lý Trại Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center bg-slate-900 text-white p-6 rounded-2xl shadow-lg mb-8">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-wider">Bảng Điều Khiển Tổng</h1>
                <p class="text-slate-400 text-sm mt-1">Quyền truy cập: <span class="text-green-400 font-bold">Quản Trị Viên (Admin)</span></p>
            </div>
            <div class="flex gap-4">
                <a href="register.html" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-bold transition-all shadow-md flex items-center gap-2">
                    <i class="fas fa-user-plus"></i> Đăng ký NV mới
                </a>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold transition-all shadow-md">
                    Thoát
                </button>
            </div>
        </div>
        <div class="flex justify-between items-center bg-indigo-600 text-white p-6 rounded-2xl shadow-lg mb-8">
    <div>
        <h1 class="text-2xl font-bold uppercase">Bảng Thống Kê Sản Lượng</h1>
        <p class="text-indigo-200 text-sm mt-1">Cập nhật trực tiếp từ hệ thống</p>
    </div>
    <a href="login.html" class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-bold shadow hover:bg-gray-100 transition">
        Vào Báo Cáo / Đăng Nhập
    </a>
    </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm font-bold uppercase">Tổng Nhân Viên</p>
                <h2 class="text-3xl font-bold text-gray-800 mt-2" id="stat-total">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm font-bold uppercase">Aion 2 (Tổng Kinah)</p>
                <h2 class="text-3xl font-bold text-purple-600 mt-2"><span id="stat-aion2">0</span> M</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-green-500">
                <p class="text-gray-500 text-sm font-bold uppercase">MapleStory (Tổng Meso)</p>
                <h2 class="text-3xl font-bold text-green-600 mt-2"><span id="stat-maple">0</span> B</h2>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
