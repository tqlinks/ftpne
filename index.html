<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Game Team Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 bg-slate-50">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-lg text-white shadow-lg"><i class="fas fa-chart-line text-2xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800">Hệ Thống Sản Lượng</h1>
                    <p class="text-xs text-gray-500 font-semibold uppercase">Dữ liệu thời gian thực</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="login.html" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition-all">Đăng Nhập</a>
                <a href="admin.html" class="bg-gray-800 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-black transition-all">Quản Trị</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-5 border-b-4 border-blue-500 flex justify-between items-center">
                <div><p class="text-xs font-bold text-gray-400 uppercase">Nhân Sự</p><p class="text-3xl font-bold" id="stat-total">--</p></div>
                <div class="text-blue-500 bg-blue-50 p-3 rounded-xl"><i class="fas fa-users text-xl"></i></div>
            </div>
            <div class="card p-5 border-b-4 border-purple-500 flex justify-between items-center">
                <div><p class="text-xs font-bold text-gray-400 uppercase">AION 2</p><p class="text-3xl font-bold" id="stat-aion2">--</p></div>
                <div class="text-purple-500 bg-purple-50 p-3 rounded-xl"><i class="fas fa-dragon text-xl"></i></div>
            </div>
            <div class="card p-5 border-b-4 border-teal-500 flex justify-between items-center">
                <div><p class="text-xs font-bold text-gray-400 uppercase">MAPLESTORY</p><p class="text-3xl font-bold" id="stat-maple">--</p></div>
                <div class="text-teal-500 bg-teal-50 p-3 rounded-xl"><i class="fas fa-leaf text-xl"></i></div>
            </div>
            <div class="card p-5 border-b-4 border-yellow-500 flex justify-between items-center">
                <div><p class="text-xs font-bold text-gray-400 uppercase">Team A/B/C</p><p class="text-xl font-bold" id="stat-teams">0/0/0</p></div>
                <div class="text-yellow-500 bg-yellow-50 p-3 rounded-xl"><i class="fas fa-sitemap text-xl"></i></div>
            </div>
        </div>

        <div class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-gray-200">
            <p class="text-gray-400 italic">Dữ liệu sản lượng chi tiết chỉ hiển thị trong trang Quản Trị.</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
