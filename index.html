<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Team Manager - Quản Lý Đội Ngũ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #4f46e5; ring: 2px; ring-color: #4f46e5; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-lg text-white shadow-lg shadow-indigo-200">
                <i class="fas fa-gamepad text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">Game Team Manager</h1>
                <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">Quản lý đội ngũ làm việc</p>
            </div>
        </div>
        <button class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 hover:bg-indigo-700 transition-all font-medium">
            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
        </button>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card p-5 flex justify-between items-center border-b-4 border-blue-500">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-1">Tổng Thành Viên</p>
                    <p class="text-3xl font-bold text-gray-800" id="stat-total">--</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl text-blue-600"><i class="fas fa-users text-xl"></i></div>
            </div>
            <div class="card p-5 flex justify-between items-center border-b-4 border-purple-500">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-1">AION 2</p>
                    <p class="text-3xl font-bold text-gray-800" id="stat-aion2">--</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-2xl text-purple-600"><i class="fas fa-dragon text-xl"></i></div>
            </div>
            <div class="card p-5 flex justify-between items-center border-b-4 border-teal-500">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-1">MAPLESTORY</p>
                    <p class="text-3xl font-bold text-gray-800" id="stat-maple">--</p>
                </div>
                <div class="bg-teal-50 p-4 rounded-2xl text-teal-600"><i class="fas fa-leaf text-xl"></i></div>
            </div>
            <div class="card p-5 flex justify-between items-center border-b-4 border-yellow-500">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-1">TEAM A / B / C</p>
                    <p class="text-2xl font-bold text-gray-800" id="stat-teams">0 / 0 / 0</p>
                </div>
                <div class="bg-yellow-50 p-4 rounded-2xl text-yellow-600"><i class="fas fa-sitemap text-xl"></i></div>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button class="bg-white px-6 py-2.5 rounded-lg shadow-sm border-b-2 border-indigo-600 font-bold text-indigo-600">Đăng Ký Mới</button>
            <button class="text-gray-500 px-6 py-2.5 hover:bg-gray-100 rounded-lg transition">Danh Sách Thành Viên</button>
        </div>

        <div class="card p-8 lg:p-12 max-w-4xl mx-auto shadow-xl">
            <div class="flex items-center gap-3 mb-8 border-b pb-4">
                <div class="bg-indigo-100 p-3 rounded-full text-indigo-600"><i class="fas fa-user-plus text-lg"></i></div>
                <h2 class="text-2xl font-bold text-gray-800">Đăng Ký Thông Tin Nhân Viên</h2>
            </div>

            <form id="registrationForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">ID Nhân Viên</label>
                    <input type="text" name="id" placeholder="Nhập ID (ví dụ: NV01)" class="input-field" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" placeholder="example@email.com" class="input-field" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Số điện thoại</label>
                    <input type="tel" name="phone" placeholder="0123 456 789" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Số máy làm việc</label>
                    <input type="number" name="pc_number" placeholder="Ví dụ: 15" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Game làm việc</label>
                    <select name="game" class="input-field bg-white" required>
                        <option value="">-- Chọn Game --</option>
                        <option value="Aion 2">Aion 2</option>
                        <option value="MapleStory">MapleStory</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Phân Team</label>
                    <select name="team" class="input-field bg-white" required>
                        <option value="">-- Chọn Team --</option>
                        <option value="Team A">Team A</option>
                        <option value="Team B">Team B</option>
                        <option value="Team C">Team C</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Mật khẩu hệ thống</label>
                    <div class="relative">
                        <input type="password" name="password" id="passwordInput" placeholder="Tạo mật khẩu để đăng nhập sau" class="input-field" required>
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-400 hover:text-indigo-600">
                            <i class="far fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="md:col-span-2 mt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-3 hover:bg-indigo-700 shadow-lg shadow-indigo-100 active:scale-[0.98] transition-all">
                        <i class="fas fa-save"></i> HOÀN TẤT ĐĂNG KÝ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // TÁCH LINK APPS SCRIPT RIÊNG BIỆT TẠI ĐÂY
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAwgFgId1sozjEphwxHJqWmFmYW2xlZqsygoKHcTnYp4tEJdxYmwPsZxSvkBr-VN_5Nw/exec";

        // 1. Hàm lấy dữ liệu thống kê từ Google Sheet
        async function fetchDashboardStats() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                // Gán dữ liệu vào giao diện
                document.getElementById('stat-total').innerText = data.total || 0;
                document.getElementById('stat-aion2').innerText = data.aion2 || 0;
                document.getElementById('stat-maple').innerText = data.maple || 0;
                document.getElementById('stat-teams').innerText = data.teams || "0 / 0 / 0";
            } catch (error) {
                console.error("Lỗi cập nhật Dashboard:", error);
            }
        }

        // 2. Xử lý gửi Form Đăng ký
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            
            // Trạng thái Loading
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG LƯU DỮ LIỆU...';

            // Thu thập dữ liệu
            const formData = new FormData(this);
            const payload = Object.fromEntries(formData.entries());

            // Gửi dữ liệu qua POST
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Tránh lỗi CORS với Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Chúc mừng! Đăng ký thành công và đã lưu vào hệ thống.");
                this.reset(); // Xóa form
                fetchDashboardStats(); // Cập nhật lại số liệu ngay lập tức
            })
            .catch(err => {
                console.error("Lỗi gửi form:", err);
                alert("Đã có lỗi xảy ra. Vui lòng thử lại.");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            });
        });

        // 3. Tiện ích: Ẩn/Hiện mật khẩu
        function togglePassword() {
            const passInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Khởi tạo khi trang tải xong
        window.onload = () => {
            fetchDashboardStats();
            // Cập nhật tự động mỗi 2 phút
            setInterval(fetchDashboardStats, 120000);
        };
    </script>
</body>
</html>
