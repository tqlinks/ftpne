<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREETO System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-card">
        <div id="login-view">
            <h2>Đăng nhập</h2>
            <input type="text" id="login-id" placeholder="Email hoặc Tên">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button id="btn-login" class="btn-primary">Vào hệ thống</button>
            <p><a id="link-to-reg">Tạo tài khoản mới</a></p>
        </div>

        <div id="reg-view" class="hidden">
            <h2>Đăng ký nhân sự</h2>
            <input type="text" id="reg-name" placeholder="Họ và Tên">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="text" id="reg-phone" placeholder="Số điện thoại">
            <input type="text" id="reg-pc" placeholder="Số máy làm việc">
            <input type="password" id="reg-pass" placeholder="Mật khẩu">
            <select id="reg-team"><option>Team A</option><option>Team B</option></select>
            <select id="reg-game"><option>Dự án 1</option><option>Dự án 2</option></select>
            <button id="btn-register" class="btn-primary">Hoàn tất</button>
            <p><a id="link-to-login">Quay lại đăng nhập</a></p>
        </div>

        <div id="profile-view" class="hidden">
            <div class="profile-header">
                <img src="" id="p-avatar" class="avatar">
                <h2 id="p-name"></h2>
            </div>
            <div id="p-details" class="info-list"></div>
            
            <button id="btn-toggle-edit" class="btn-outline">Sửa Profile</button>
            <div id="edit-form" class="hidden">
                <input type="text" id="edit-avatar" placeholder="Link ảnh (URL)">
                <input type="text" id="edit-phone" placeholder="Số điện thoại mới">
                <input type="text" id="edit-pc" placeholder="Số máy mới">
                <button id="btn-save-info" class="btn-primary">Lưu thay đổi</button>
            </div>

            <div class="prog-box">
                <p>Tiến độ: <span id="prog-percent">0%</span></p>
                <input type="range" id="prog-slider" min="0" max="100">
                <button id="btn-save-prog" class="btn-success">Cập nhật</button>
            </div>
            <button onclick="location.reload()" class="btn-logout">Đăng xuất</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
