<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Team Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-lg text-white">
                <i class="fas fa-gamepad text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">Game Team Manager</h1>
                <p class="text-xs text-gray-500 font-semibold uppercase">Quản lý đội ngũ</p>
            </div>
        </div>
        <button class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="card p-5 flex justify-between items-center border-b-4 border-blue-500">
            <div><p class="text-xs font-bold text-gray-400 uppercase">Tổng Thành Viên</p><p class="text-3xl font-bold" id="stat-total">--</p></div>
            <div class="bg-blue-50 p-4 rounded-xl text-blue-600"><i class="fas fa-users text-xl"></i></div>
        </div>
        <div class="card p-5 flex justify-between items-center border-b-4 border-purple-500">
            <div><p class="text-xs font-bold text-gray-400 uppercase">AION 2</p><p class="text-3xl font-bold" id="stat-aion2">--</p></div>
            <div class="bg-purple-50 p-4 rounded-xl text-purple-600"><i class="fas fa-dragon text-xl"></i></div>
        </div>
        <div class="card p-5 flex justify-between items-center border-b-4 border-teal-500">
            <div><p class="text-xs font-bold text-gray-400 uppercase">MAPLESTORY</p><p class="text-3xl font-bold" id="stat-maple">--</p></div>
            <div class="bg-teal-50 p-4 rounded-xl text-teal-600"><i class="fas fa-leaf text-xl"></i></div>
        </div>
        <div class="card p-5 flex justify-between items-center border-b-4 border-yellow-500">
            <div><p class="text-xs font-bold text-gray-400 uppercase">TEAM A/B/C</p><p class="text-xl font-bold" id="stat-teams">0/0/0</p></div>
            <div class="bg-yellow-50 p-4 rounded-xl text-yellow-600"><i class="fas fa-sitemap text-xl"></i></div>
        </div>
    </div>

    <div class="card p-8 max-w-4xl mx-auto shadow-xl">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Đăng Ký Thành Viên</h2>
        <form id="registrationForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" name="id" placeholder="ID Nhân Viên" class="input-field" required>
            <input type="email" name="email" placeholder="Email" class="input-field" required>
            <input type="tel" name="phone" placeholder="Số điện thoại" class="input-field">
            <input type="number" name="pc_number" placeholder="Số máy làm việc" class="input-field">
            <select name="game" class="input-field bg-white" required>
                <option value="">Chọn Game</option>
                <option value="Aion 2">Aion 2</option>
                <option value="MapleStory">MapleStory</option>
            </select>
            <select name="team" class="input-field bg-white" required>
                <option value="">Chọn Team</option>
                <option value="Team A">Team A</option>
                <option value="Team B">Team B</option>
                <option value="Team C">Team C</option>
            </select>
            <div class="md:col-span-2 relative">
                <input type="password" name="password" id="passwordInput" placeholder="Mật khẩu" class="input-field" required>
                <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-400">
                    <i class="far fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <button type="submit" id="submitBtn" class="md:col-span-2 bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all">
                LƯU THÔNG TIN
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
