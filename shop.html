<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Linh Thú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        /* Hiệu ứng thẻ bài Game */
        .pet-card { transition: all 0.3s ease; }
        .pet-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2), 0 10px 10px -5px rgba(0,0,0,0.1); border-color: #fbbf24; }
        /* Ẩn thanh cuộn cho menu filter */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-gray-900 min-h-screen transition-colors duration-300 pb-12 font-sans">

    <div class="bg-slate-900 text-white p-6 shadow-2xl relative overflow-hidden border-b-4 border-yellow-500">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
        <div class="max-w-7xl mx-auto relative z-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-orange-400 to-red-500 drop-shadow-lg">
                    <i class="fas fa-dragon text-yellow-400"></i> Trại Linh Thú
                </h1>
                <p class="text-gray-400 text-sm mt-1 font-medium">Sử dụng FPE để chiêu mộ đồng hành đắc lực</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-black/40 border border-gray-600 px-5 py-2 rounded-xl text-center shadow-inner">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Số dư FPE</p>
                    <p class="text-2xl font-black text-yellow-400 drop-shadow-md"><span id="shop-fpe">0</span> <i class="fas fa-coins text-yellow-500 animate-pulse"></i></p>
                </div>
                <button onclick="window.location.assign('profile.html')" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-3 rounded-xl font-bold transition-all shadow-lg text-sm flex items-center gap-2 border border-indigo-500">
                    <i class="fas fa-sign-out-alt"></i> Thoát
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mt-6 px-4">
        
        <div class="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-md mb-6 border dark:border-gray-700 flex items-center gap-2 overflow-x-auto no-scrollbar" id="filter-container">
            <button onclick="renderShop('All')" class="filter-btn active shrink-0 bg-yellow-400 text-yellow-900 hover:bg-yellow-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors shadow-sm">Tất Cả</button>
            <button onclick="renderShop('Hỏa')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-red-100 dark:hover:bg-red-900/50 hover:text-red-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors">🔥 Hỏa</button>
            <button onclick="renderShop('Thủy')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors">💧 Thủy</button>
            <button onclick="renderShop('Mộc')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-green-100 dark:hover:bg-green-900/50 hover:text-green-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors">🌿 Mộc</button>
            <button onclick="renderShop('Phong')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-teal-100 dark:hover:bg-teal-900/50 hover:text-teal-400 px-4 py-2 rounded-xl font-bold text-xs transition-colors">🌪️ Phong</button>
            <button onclick="renderShop('Thổ')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-amber-100 dark:hover:bg-amber-900/50 hover:text-amber-600 px-4 py-2 rounded-xl font-bold text-xs transition-colors">🪨 Thổ</button>
            <button onclick="renderShop('Lôi')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-purple-900/50 hover:text-purple-400 px-4 py-2 rounded-xl font-bold text-xs transition-colors">⚡ Lôi</button>
            <button onclick="renderShop('Quang')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-yellow-100 dark:hover:bg-yellow-900/50 hover:text-yellow-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors">✨ Quang</button>
            <button onclick="renderShop('Ám')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 hover:text-white px-4 py-2 rounded-xl font-bold text-xs transition-colors">🌑 Ám</button>
            <button onclick="renderShop('Băng')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-cyan-100 dark:hover:bg-cyan-900/50 hover:text-cyan-400 px-4 py-2 rounded-xl font-bold text-xs transition-colors">❄️ Băng</button>
            <button onclick="renderShop('Kim')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-slate-200 dark:hover:bg-slate-600 hover:text-slate-400 px-4 py-2 rounded-xl font-bold text-xs transition-colors">⚔️ Kim</button>
            <button onclick="renderShop('Độc')" class="filter-btn shrink-0 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-lime-100 dark:hover:bg-lime-900/50 hover:text-lime-500 px-4 py-2 rounded-xl font-bold text-xs transition-colors">☠️ Độc</button>
        </div>

        <div id="pet-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            </div>
    </div>

    <div id="petModal" class="fixed inset-0 bg-gray-900/90 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300 z-50 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 border dark:border-gray-700" id="petModalContent">
            </div>
    </div>

    <script src="config.js"></script>
    <script src="pets-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
