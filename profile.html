<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Của Tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-active { opacity: 1 !important; pointer-events: auto !important; }
        .modal-active > div { transform: scale(1) !important; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-gray-900 transition-colors duration-300 p-4 min-h-screen">
    
    <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-xl mt-4 border dark:border-gray-700">
        
        <div class="flex justify-between items-center border-b dark:border-gray-700 pb-4 mb-5">
            <h2 class="text-xl font-black text-gray-800 dark:text-white uppercase tracking-tighter">Hồ Sơ Nhân Viên</h2>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="text-gray-500 dark:text-gray-400 hover:bg-slate-100 dark:hover:bg-gray-700 p-2 rounded-full transition">
                    <i class="fas fa-sun block dark:hidden"></i>
                    <i class="fas fa-moon hidden dark:block"></i>
                </button>
                <button onclick="logout()" class="text-red-500 font-bold hover:bg-red-50 dark:hover:bg-red-900/20 px-3 py-1.5 rounded-lg text-sm transition">Thoát</button>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-6 relative">
            <div class="relative">
                <img id="p-avatar" src="https://i.pravatar.cc/150" alt="Avatar" class="w-20 h-20 rounded-full border-4 border-indigo-50 dark:border-gray-700 shadow-md object-cover">
                <span class="absolute bottom-1 right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-white dark:border-gray-800 animate-pulse"></span>
            </div>
            <div class="flex-grow">
                <h2 id="p-id" class="text-2xl font-black text-gray-800 dark:text-white uppercase tracking-tight">...</h2>
                <div class="flex gap-3 mt-1">
                    <span class="text-xs font-bold px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-md dark:bg-indigo-900/30 dark:text-indigo-400">Team: <span id="p-team">...</span></span>
                    <span class="text-xs font-bold px-2 py-0.5 bg-orange-100 text-orange-700 rounded-md dark:bg-orange-900/30 dark:text-orange-400">Game: <span id="p-game">...</span></span>
                </div>
            </div>
            <button onclick="openEditModal()" class="text-gray-400 hover:text-indigo-600 transition p-2">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>

        <div class="bg-gradient-to-br from-yellow-400/10 to-orange-500/10 border border-yellow-200 dark:border-yellow-700/30 p-4 rounded-2xl mb-6 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-yellow-600 uppercase tracking-widest mb-1">Điểm FPE</p>
                <p class="text-3xl font-black text-yellow-700 dark:text-yellow-500"><span id="p-fpe">0</span> <i class="fas fa-coins text-sm ml-1"></i></p>
            </div>
            <button id="btn-checkin" onclick="handleCheckIn()" class="bg-gradient-to-r from-yellow-500 to-orange-600 text-white px-5 py-2.5 rounded-xl font-black shadow-lg hover:shadow-orange-500/40 transition-all active:scale-95 flex items-center gap-2">
                <i class="fas fa-calendar-check"></i> ĐIỂM DANH
            </button>
        </div>

        <div class="space-y-4 mb-8 bg-slate-50 dark:bg-gray-800/50 p-4 rounded-2xl border dark:border-gray-700">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                <i class="fas fa-chart-line text-indigo-500"></i> Tiến độ mục tiêu
            </h3>
            <div>
                <div class="flex justify-between text-[11px] mb-1 font-bold">
                    <span class="text-purple-700 dark:text-purple-400">AION 2 (KINAH)</span>
                    <span class="text-gray-500"><span id="prog-k-current">0</span>/<span id="prog-k-goal">0</span>M</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 h-3 rounded-full overflow-hidden relative">
                    <div id="bar-kinah" class="progress-bar bg-purple-600 h-full w-0"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[11px] mb-1 font-bold">
                    <span class="text-green-700 dark:text-green-400">MAPLE (MESO)</span>
                    <span class="text-gray-500"><span id="prog-m-current">0</span>/<span id="prog-m-goal">0</span>B</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 h-3 rounded-full overflow-hidden">
                    <div id="bar-meso" class="progress-bar bg-green-600 h-full w-0"></div>
                </div>
            </div>
        </div>

        <div class="mb-8 p-4 bg-indigo-50/30 dark:bg-indigo-900/10 rounded-2xl border-2 border-dashed border-indigo-200 dark:border-indigo-800/50">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-indigo-600 dark:text-indigo-400 uppercase text-sm italic">
                    <i class="fas fa-dragon mr-1"></i> Linh Thú Đồng Hành
                </h3>
                <span class="text-[10px] font-bold bg-white dark:bg-gray-700 px-2 py-1 rounded-lg shadow-sm">
                    Slot: <span id="current-slots">0</span>/10
                </span>
            </div>
            <div id="profile-pets-list" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <div class="space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="input-kinah" placeholder="Kinah" class="w-full p-2 text-sm border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <input type="number" id="input-meso" placeholder="Meso" class="w-full p-2 text-sm border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <input type="number" id="input-char45" placeholder="Acc" class="w-full p-2 text-sm border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            </div>
            <button onclick="updateProduction()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black hover:bg-indigo-700 shadow-lg transition active:scale-95">
                LƯU SẢN LƯỢNG MỚI
            </button>
            <button id="admin-panel-btn" onclick="location.href='admin.html'" class="hidden w-full bg-slate-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 border border-slate-700">
                <i class="fas fa-crown text-yellow-400"></i> QUẢN TRỊ ADMIN
            </button>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 pointer-events-none z-50 transition-all duration-300">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm transform scale-90 transition-all duration-300 border dark:border-gray-700">
            <h2 class="text-xl font-black mb-4 dark:text-white uppercase italic">Cài đặt tài khoản</h2>
            <div class="space-y-4">
                <input type="text" id="edit-phone" placeholder="Số điện thoại" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <input type="text" id="edit-pc" placeholder="Số máy (PCxx)" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <input type="text" id="edit-avatar" placeholder="Link ảnh đại diện (Pinterest/FB...)" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 py-3 font-bold text-gray-500">HỦY</button>
                    <button onclick="handleUpdateProfile()" class="flex-[2] bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg">CẬP NHẬT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/pets-data.js"></script>
    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
