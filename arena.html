<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu Trường Linh Thú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hp-bar { transition: width 0.5s ease-in-out; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .vs-anim { animation: zoomIn 0.5s infinite alternate; }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.2); } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 overflow-hidden">

    <div class="flex justify-between items-center mb-8">
        <button onclick="window.location.assign('shop.html')" class="text-gray-400 hover:text-white"><i class="fas fa-chevron-left"></i> Quay lại Shop</button>
        <h1 class="text-3xl font-black italic tracking-tighter text-yellow-500">ARENA BATTLE</h1>
        <div class="w-20"></div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 items-center mt-10">
        
        <div id="player-side" class="text-center space-y-4">
            <div class="relative inline-block">
                <img id="p-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=none" class="w-48 h-48 mx-auto drop-shadow-[0_0_20px_rgba(59,130,246,0.5)]">
                <div class="absolute -top-4 -left-4 bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Bạn</div>
            </div>
            <h2 id="p-name" class="text-xl font-black italic uppercase">---</h2>
            <div class="w-full bg-gray-800 h-4 rounded-full border border-gray-600 overflow-hidden">
                <div id="p-hp-bar" class="hp-bar bg-green-500 h-full" style="width: 100%"></div>
            </div>
            <p class="text-xs font-bold">HP: <span id="p-hp-text">0/0</span></p>
        </div>

        <div class="text-center">
            <div class="text-6xl font-black text-red-600 vs-anim italic mb-6">VS</div>
            <div id="battle-log" class="bg-black/50 border border-gray-800 rounded-xl p-4 h-48 overflow-y-auto text-left text-[10px] font-mono space-y-1 no-scrollbar">
                <p class="text-gray-500 italic">Chọn đối thủ để bắt đầu...</p>
            </div>
            <button id="start-btn" onclick="startBattle()" class="mt-6 bg-yellow-500 text-black px-8 py-3 rounded-full font-black hover:bg-yellow-400 transition-all shadow-[0_0_15px_rgba(234,179,8,0.4)]">KHAI CHIẾN!</button>
        </div>

        <div id="enemy-side" class="text-center space-y-4">
            <div class="relative inline-block">
                <img id="e-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=enemy" class="w-48 h-48 mx-auto drop-shadow-[0_0_20px_rgba(239,68,68,0.5)]">
                <div class="absolute -top-4 -right-4 bg-red-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Đối Thủ</div>
            </div>
            <h2 id="e-name" class="text-xl font-black italic uppercase">---</h2>
            <div class="w-full bg-gray-800 h-4 rounded-full border border-gray-600 overflow-hidden">
                <div id="e-hp-bar" class="hp-bar bg-red-500 h-full" style="width: 100%"></div>
            </div>
            <p class="text-xs font-bold">HP: <span id="e-hp-text">0/0</span></p>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-gray-900/80 backdrop-blur-md p-4 border-t border-gray-800">
        <p class="text-center text-[10px] font-bold text-gray-500 uppercase mb-3">Linh thú bạn đang sở hữu</p>
        <div id="owned-pets-list" class="flex justify-center gap-4 overflow-x-auto pb-2">
            </div>
    </div>

    <script src="pets-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
