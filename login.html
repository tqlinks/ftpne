<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-800 flex items-center justify-center h-screen p-4">

    <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6 uppercase tracking-wider">Đăng Nhập</h2>
        <div class="space-y-5">
            <div class="relative">
                <i class="fas fa-user absolute left-3 top-3.5 text-gray-400"></i>
                <input type="text" id="login-id" placeholder="ID Nhân viên" class="w-full pl-10 pr-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            
            <div class="relative">
                <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                <input type="password" id="login-pass" placeholder="Mật khẩu" class="w-full pl-10 pr-10 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <i class="fas fa-eye absolute right-3 top-3.5 text-gray-400 cursor-pointer hover:text-indigo-500" onclick="togglePassword()" id="eyeIcon"></i>
            </div>

            <button id="loginBtn" onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">VÀO HỆ THỐNG</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>

    <script>
        function togglePassword() {
            const pass = document.getElementById('login-pass');
            const icon = document.getElementById('eyeIcon');
            if (pass.type === 'password') {
                pass.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pass.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
    <script src="js/config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
</body>
</body>
</html>
